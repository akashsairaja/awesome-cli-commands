name: Validate Data

on:
  pull_request:
    branches: [main]
    paths:
      - "commands/**"
      - "recipes/**"
      - "agents/**"
      - "skills/**"
      - "rules/**"
      - "schemas/**"

permissions:
  contents: read

jobs:
  validate:
    name: Schema & Integrity Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full validation
        run: node scripts/validate.mjs

      - name: Summary
        if: always()
        run: |
          echo "### Validation Results" >> $GITHUB_STEP_SUMMARY
          if [ ${{ job.status }} == 'success' ]; then
            echo "All data files passed validation." >> $GITHUB_STEP_SUMMARY
          else
            echo "Validation failed. Check the logs above for details." >> $GITHUB_STEP_SUMMARY
          fi
